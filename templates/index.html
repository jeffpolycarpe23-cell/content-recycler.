<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PolyContent AI</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background: #f4f4f9; }
        .container { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: inline-block; }
        textarea { width: 100%; height: 100px; margin: 10px 0; }
        button { background: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 PolyContent AI</h1>
        <form method="POST">
            <textarea name="idee" placeholder="Entrez votre texte ici..."></textarea><br>
            <button type="submit">Recycler le contenu</button>
        </form>

        {% if resultat_ia %}
            <div style="margin-top: 20px; padding: 15px; background: #e9ecef; text-align: left;">
                <h3>Résultat :</h3>
                <p>{{ resultat_ia }}</p>
                
                <form action="/download-pdf" method="post">
                    <input type="hidden" name="resultat_ia" value="{{ resultat_ia }}">
                    <button type="submit" style="background: #28a745;">📥 Télécharger en PDF</button>
                </form>
            </div>
        {% endif %}
    </div>
</body>
</html>
