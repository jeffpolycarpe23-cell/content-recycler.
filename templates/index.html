{% if resultat_ia %}
    <div style="text-align: center; margin-top: 30px; margin-bottom: 30px;">
        
        <form action="/download-pdf" method="post">
            <input type="hidden" name="resultat_ia" value="{{ resultat_ia }}">
            
            <button type="submit" style="
                background: linear-gradient(90deg, #2463EB, #1D4ED8);
                color: white;
                padding: 15px 35px;
                border: none;
                border-radius: 50px;
                font-size: 16px;
                font-weight: 600;
                cursor: pointer;
                box-shadow: 0 4px 15px rgba(36, 99, 235, 0.3);
                transition: 0.3s;">
                📥 Télécharger mon rapport d'expert (PDF)
            </button>
        </form>
        
    </div>
{% endif %}
