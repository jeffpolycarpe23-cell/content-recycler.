<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PolyContent AI - Pro Hub</title>
    <style>
        :root { --bg: #101827; --card: #1f2937; --accent: #3b82f6; --text: #f3f4f6; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .container { background: var(--card); padding: 2rem; border-radius: 1.5rem; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); width: 100%; max-width: 450px; text-align: center; }
        h1 { font-size: 1.8rem; margin-bottom: 0.5rem; }
        .subtitle { color: #9ca3af; font-size: 0.9rem; margin-bottom: 2rem; }
        .mode-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .mode-btn { background: #374151; border: 2px solid transparent; padding: 15px; border-radius: 12px; color: white; cursor: pointer; transition: 0.3s; font-weight: bold; }
        .mode-btn:hover { border-color: var(--accent); }
        .mode-btn.active { border-color: var(--accent); background: rgba(59, 130, 246, 0.1); }
        textarea { width: 100%; height: 120px; background: #111827; border: 1px solid #374151; border-radius: 12px; padding: 15px; color: white; margin-bottom: 20px; box-sizing: border-box; }
        .btn-submit { background: var(--accent); color: white; width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .result-box { margin-top: 25px; padding: 20px; background: #374151; border-radius: 12px; text-align: left; }
        .pdf-btn { background: #059669; color: white; width: 100%; padding: 12px; border-radius: 12px; border: none; margin-top: 15px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <div style="font-size: 40px;">🚀</div>
        <h1>Générateur de Succès</h1>
        <p class="subtitle">Propulsez votre business immobilier ou freelance.</p>

        <form method="POST" id="mainForm">
            <div class="mode-buttons">
                <button type="button" onclick="selectMode('immobilier')" id="btn-immo" class="mode-btn">🏠 IMMOBILIER</button>
                <button type="button" onclick="selectMode('freelance')" id="btn-free" class="mode-btn">💼 FREELANCE PRO</button>
            </div>

            <input type="hidden" name="service_type" id="service_type" value="immobilier">

            <textarea name="user_input" placeholder="✨ Collez l'annonce Upwork ou l'idée ici..." required></textarea>

            <button type="submit" class="btn-submit" id="submit-btn">LANCER L'ANALYSE ✨</button>
        </form>

        {% if resultat_ia %}
        <div class="result-box">
            <h3 style="margin-top:0;">✨ Résultat :</h3>
            <p style="white-space: pre-wrap;">{{ resultat_ia }}</p>
            
            <form action="/download-pdf" method="POST">
                <input type="hidden" name="resultat_ia" value="{{ resultat_ia }}">
                <button type="submit" class="pdf-btn">📩 Télécharger en PDF</button>
            </form>
        </div>
        {% endif %}
    </div>

    <script>
        function selectMode(mode) {
            // Met à jour la valeur pour le serveur
            document.getElementById('service_type').value = mode;
            
            // Change l'apparence des boutons
            document.getElementById('btn-immo').classList.remove('active');
            document.getElementById('btn-free').classList.remove('active');
            
            if(mode === 'immobilier') {
                document.getElementById('btn-immo').classList.add('active');
            } else {
                document.getElementById('btn-free').classList.add('active');
            }
        }

        // Gestion du message de réassurance au clic sur "Lancer"
        document.getElementById('mainForm').onsubmit = function() {
            const mode = document.getElementById('service_type').value;
            const btn = document.getElementById('submit-btn');
            
            if (mode === 'immobilier') {
                btn.innerHTML = "✨ Création de vos scripts TikTok & IG...";
            } else {
                btn.innerHTML = "🚀 Rédaction de votre stratégie Freelance...";
            }
            btn.style.background = "#ffcc00";
            btn.style.color = "#000";
        };

        // Activer le mode immo par défaut au chargement
        selectMode('immobilier');
    </script>
</body>
</html>
